<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11sport.bet | Manage Players</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fdf4ff',
                            100: '#fae8ff',
                            400: '#e879f9',
                            500: '#d946ef',
                            700: '#a21caf',
                            900: '#701a75'
                        }
                    }
                }
            }
        };
    </script>
    <link rel="stylesheet" href="../styles/main.css" />
</head>

<body class="bg-[#030108] text-slate-100">
    <div id="app" data-page="players">
        <div data-component="header"></div>

        <main class="mx-auto max-w-[1200px] px-4 py-8">
            <div class="mb-8 flex items-center justify-between border-b border-fuchsia-500/20 pb-4">
                <div>
                    <h1 class="text-3xl font-extrabold text-white drop-shadow-[0_0_15px_rgba(232,121,249,0.5)]">Manage
                        Players</h1>
                    <p class="mt-2 text-sm text-fuchsia-300">View and manage players under your agency.</p>
                </div>
            </div>

            <div
                class="section-card shadow-[0_4px_20px_rgba(0,0,0,0.3)] bg-[#0a0414] border-fuchsia-500/30 overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="border-b border-fuchsia-500/30 text-fuchsia-400">
                            <th class="py-3 px-4">Name</th>
                            <th class="py-3 px-4">Email</th>
                            <th class="py-3 px-4">Agent</th>
                            <th class="py-3 px-4 text-right">Balance</th>
                        </tr>
                    </thead>
                    <tbody id="players-table-body">
                        <tr>
                            <td colspan="4" class="py-8 text-center text-slate-400">Loading players...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>

        <div data-component="footer"></div>
    </div>
    <script type="module" src="../js/app.js"></script>
    <script type="module">
        import { playersApi } from '../js/api/client.js';

        document.addEventListener('DOMContentLoaded', async () => {
            const tbody = document.getElementById('players-table-body');

            try {
                const { players } = await playersApi.listForCurrentUser();

                if (players.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="py-8 text-center text-slate-400">No players found.</td></tr>';
                    return;
                }

                tbody.innerHTML = players.map(p => `
            <tr class="border-b border-fuchsia-500/10 hover:bg-fuchsia-500/5 transition-colors">
              <td class="py-3 px-4 font-semibold text-white">${p.name}</td>
              <td class="py-3 px-4">${p.email}</td>
              <td class="py-3 px-4"><span class="rounded bg-fuchsia-500/20 px-2 py-1 text-xs text-fuchsia-300">${p.agentName}</span></td>
              <td class="py-3 px-4 text-right font-bold text-cyan-400">$${p.balance.toFixed(2)}</td>
            </tr>
          `).join('');

            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-8 text-center text-rose-400">Error: ${err.message}</td></tr>`;
            }
        });
    </script>
</body>

</html>
