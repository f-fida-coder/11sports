<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in to 11sport.bet" />
    <title>Sign In | 11sport.bet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body class="bg-[#030108] text-slate-100">
    <div id="app" data-page="signin">
      <div data-component="header"></div>

      <main class="mx-auto max-w-[640px] px-4 py-12">
        <section class="section-card">
          <h1 class="text-2xl font-extrabold">Sign In</h1>
          <p class="muted mt-2 text-sm">Access your 11sport account securely.</p>

          <form id="auth-form" class="mt-6 space-y-4" novalidate>
            <label class="block text-sm font-semibold">
              Email
              <input name="email" type="email" required autocomplete="email" class="mt-1 w-full rounded-lg border border-fuchsia-500/30 bg-[#07150e] px-3 py-2 outline-none focus:border-fuchsia-400" />
              <span data-error class="mt-1 block text-xs text-rose-300"></span>
            </label>

            <label class="block text-sm font-semibold">
              Password
              <input name="password" type="password" required minlength="8" autocomplete="current-password" class="mt-1 w-full rounded-lg border border-fuchsia-500/30 bg-[#07150e] px-3 py-2 outline-none focus:border-fuchsia-400" />
              <span data-error class="mt-1 block text-xs text-rose-300"></span>
            </label>

            <button type="submit" class="btn-primary w-full">Sign In</button>
            <p data-status class="mt-3 text-sm"></p>
          </form>

          <p class="mt-6 text-sm text-slate-300">No account? <a href="./signup.html" class="text-fuchsia-400">Create one</a>.</p>
        </section>
      </main>

      <div data-component="footer"></div>
    </div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
