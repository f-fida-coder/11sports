<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create your 11sport.bet account" />
    <title>Register | 11sport.bet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body class="bg-[#06120c] text-slate-100">
    <div id="app" data-page="signup">
      <div data-component="header"></div>

      <main class="mx-auto max-w-[640px] px-4 py-12">
        <section class="section-card">
          <h1 class="text-2xl font-extrabold">Create Account</h1>
          <p class="muted mt-2 text-sm">Register to unlock bonuses, live betting and full markets.</p>

          <form id="auth-form" class="mt-6 space-y-4" novalidate>
            <label class="block text-sm font-semibold">
              Email
              <input name="email" type="email" required autocomplete="email" class="mt-1 w-full rounded-lg border border-emerald-500/30 bg-[#07150e] px-3 py-2 outline-none focus:border-emerald-400" />
              <span data-error class="mt-1 block text-xs text-rose-300"></span>
            </label>

            <label class="block text-sm font-semibold">
              Password
              <input name="password" type="password" required minlength="8" autocomplete="new-password" class="mt-1 w-full rounded-lg border border-emerald-500/30 bg-[#07150e] px-3 py-2 outline-none focus:border-emerald-400" />
              <span data-error class="mt-1 block text-xs text-rose-300"></span>
            </label>

            <label class="block text-sm font-semibold">
              Confirm password
              <input name="confirmPassword" type="password" required minlength="8" autocomplete="new-password" class="mt-1 w-full rounded-lg border border-emerald-500/30 bg-[#07150e] px-3 py-2 outline-none focus:border-emerald-400" />
              <span data-error class="mt-1 block text-xs text-rose-300"></span>
            </label>

            <label class="flex items-start gap-2 text-sm text-slate-300">
              <input type="checkbox" name="acceptTerms" required class="mt-1" />
              <span>I confirm I am 18+ and accept Terms & Conditions and Privacy Policy.</span>
            </label>

            <button type="submit" class="btn-primary w-full">Create Account</button>
            <p data-status class="mt-3 text-sm"></p>
          </form>

          <p class="mt-6 text-sm text-slate-300">Already registered? <a href="./signin.html" class="text-emerald-400">Sign in</a>.</p>
        </section>
      </main>

      <div data-component="footer"></div>
    </div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
